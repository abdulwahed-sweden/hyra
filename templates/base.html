<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Hyra{% endblock %}</title>
<meta name="description" content="{% block meta_description %}Rental queue engine demo — Python, Django, PostgreSQL, Elasticsearch{% endblock %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
/* ═══ SHARED DESIGN SYSTEM ═══ */
:root {
    --bs-font-sans-serif: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --bs-body-font-size: 1rem;
    --bs-body-line-height: 1.6;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --accent-subtle: #eef2ff;
    --accent-muted: #818cf8;
    --surface: #ffffff;
    --surface-raised: #ffffff;
    --surface-muted: #f9fafb;
    --bs-secondary-bg: #e9ecef;
    --bs-secondary-bg-rgb: 233, 236, 239;
    --border: #e5e7eb;
    --border-light: #f3f4f6;
    --text-primary: #0f172a;
    --text-secondary: #374151;
    --text-muted: #6b7280;
    --success: #059669;
    --success-subtle: #ecfdf5;
    --success-text: #065f46;
    --danger: #dc2626;
    --danger-subtle: #fef2f2;
    --danger-text: #991b1b;
    --warning: #d97706;
    --warning-subtle: #fffbeb;
    --warning-text: #92400e;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
    --gutter: clamp(1.5rem, 5vw, 3rem);
}
body { font-family: 'Inter', -apple-system, sans-serif; font-size: 16px; line-height: 1.6; color: var(--text-primary); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
h1,h2,h3,h4,h5,h6 { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.025em; color: var(--text-primary); line-height: 1.3; }
code { font-size: .85em; color: var(--accent); }
a { color: var(--accent); }
a:hover { color: var(--accent-hover); }

/* Navbar shared */
.brand-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 16px; }
.navbar-brand { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em; }
.navbar .nav-link { font-size: .9rem; font-weight: 500; color: var(--text-secondary); }
.navbar .nav-link:hover { color: var(--text-primary); }
.btn-primary { background: var(--accent); border-color: var(--accent); }
.btn-primary:hover, .btn-primary:active { background: var(--accent-hover); border-color: var(--accent-hover); }

/* Footer shared */
.site-footer { border-top: 1px solid var(--border); background: var(--surface-muted); }

/* Stat numbers */
.stat-num { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: -0.03em; line-height: 1; }

/* API table helpers */
.method-badge { font-size: .7rem; font-weight: 700; letter-spacing: .05em; font-family: 'SF Mono', SFMono-Regular, monospace; padding: .25rem .5rem; }
.api-path { font-family: 'SF Mono', SFMono-Regular, Menlo, monospace; font-size: .85rem; font-weight: 500; }

/* Health dots */
.health-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.health-ok { background: #10b981; }
.health-down { background: #ef4444; }

/* XSS helper */
.esc-helper { display: none; }
{% block extra_css %}{% endblock %}
</style>
</head>
<body class="{% block body_class %}{% endblock %}">

{% include "includes/navbar.html" %}

{% block content %}{% endblock %}

{% include "includes/footer.html" %}

<script>
/* Shared XSS helper */
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
{% block extra_js %}{% endblock %}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
